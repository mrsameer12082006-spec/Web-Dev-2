<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Type</title>
</head>
<body>
    <!-- 2. Second event type  -->
    <!-- A keyboard event in JavaScript is triggered when the user presses, holds, or releases a key on the keyboard. -->
    <!-- example: keydown and keyup -->

    <!-- keydown -->
    <!-- The keydown event is triggered when a key is pressed down on the keyboard.
         It fires once, immediately when the key is pressed (even if it's held down). -->


    <h1>press any key on your keyboard </h1>

    <script>
        

        document.addEventListener("keydown",function(event){
            console.log("you pressed ", event.key);
        })

        document.addEventListener("keyup",function(event){
            console.log("you up", event.key)
        })
    </script>





</body>
</html>
